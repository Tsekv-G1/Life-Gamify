<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hook Bank — 400 Hooks</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070a;--s1:#0e0e12;--s2:#141418;--s3:#1a1a20;
  --bd:#1f1f28;--bd2:#2c2c38;--tx:#e2e2f0;--mt:#52526a;--mt2:#8888a0;--wh:#f5f5ff;
  --acc:#c8ff00;--acc2:#00e5ff;--warn:#ff6b35;--good:#3ecf8e;
  --c4c:#ff4e6a;--ugc:#ffb930;--vo:#7c6fff;--txt:#3ecf8e;
  --pain:#ff4e6a;--social:#7c6fff;--proof:#ffb930;--edu:#c8ff00;
  --fn:'Inter',sans-serif;--mo:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);font-size:15px;line-height:1.65;-webkit-font-smoothing:antialiased;min-height:100vh}

/* HERO */
.hero{padding:56px 36px 44px;max-width:1280px;margin:0 auto;position:relative}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.4}
.hero-ey{font-family:var(--mo);font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--mt2);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.hero-ey::before{content:'';width:20px;height:1px;background:var(--mt2)}
.hero-title{font-size:clamp(40px,7vw,80px);font-weight:900;letter-spacing:-.05em;line-height:.95;color:var(--wh);margin-bottom:8px}
.hero-title em{font-style:normal;color:var(--acc)}
.hero-sub{font-size:15px;color:var(--mt2);max-width:520px;line-height:1.8;margin-top:14px}
.hero-stats{display:flex;gap:36px;margin-top:28px;flex-wrap:wrap}
.hs{display:flex;flex-direction:column;gap:2px}
.hs-val{font-family:var(--mo);font-size:20px;font-weight:700;color:var(--acc)}
.hs-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mt)}

/* NAV */
.nav{position:sticky;top:0;z-index:200;background:rgba(7,7,10,.94);backdrop-filter:blur(24px);border-bottom:1px solid var(--bd)}
.nav-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:2px;padding:0 36px;overflow-x:auto;scrollbar-width:none}
.nav-inner::-webkit-scrollbar{display:none}
.ntab{padding:15px 16px;font-family:var(--fn);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--mt2);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.ntab:hover{color:var(--tx)}
.ntab.on{color:var(--wh);border-bottom-color:var(--acc)}
.ntab.on.t4c{color:var(--c4c);border-bottom-color:var(--c4c)}
.ntab.on.tugc{color:var(--ugc);border-bottom-color:var(--ugc)}
.ntab.on.tvo{color:var(--vo);border-bottom-color:var(--vo)}
.ntab.on.ttxt{color:var(--txt);border-bottom-color:var(--txt)}
.ntab.on.tpain{color:var(--pain);border-bottom-color:var(--pain)}
.ntab.on.tsocial{color:var(--social);border-bottom-color:var(--social)}
.ntab.on.tproof{color:var(--proof);border-bottom-color:var(--proof)}
.ntab.on.tedu{color:var(--edu);border-bottom-color:var(--edu)}
.nav-sep{width:1px;height:24px;background:var(--bd2);margin:0 6px;flex-shrink:0}
.nc{font-family:var(--mo);font-size:10px;margin-left:5px;opacity:.6}
.rand-btn-nav{padding:8px 14px;font-family:var(--mo);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;background:rgba(200,255,0,.08);border:1px solid rgba(200,255,0,.25);color:var(--acc);transition:all .15s;white-space:nowrap}
.rand-btn-nav:hover{background:rgba(200,255,0,.15)}

/* CONTENT */
.content{max-width:1280px;margin:0 auto;padding:32px 36px 100px}
.section{display:none}.section.on{display:block}

/* SEC HEAD */
.sec-head{margin-bottom:24px;padding:20px 24px;border:1px solid var(--bd);background:var(--s1);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.sh-name{font-size:18px;font-weight:800;color:var(--wh);letter-spacing:-.02em}
.sh-desc{font-size:12px;color:var(--mt2);margin-top:4px;line-height:1.7}
.sh-stat{font-family:var(--mo);font-size:11px;padding:4px 12px;border:1px solid var(--bd2);color:var(--mt2);white-space:nowrap;flex-shrink:0;align-self:flex-start}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.sw{flex:1;min-width:220px;position:relative}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mt);font-size:14px;pointer-events:none}
.sin{width:100%;background:var(--s1);border:1px solid var(--bd);padding:11px 14px 11px 36px;font-family:var(--fn);font-size:14px;color:var(--tx);outline:none;transition:border-color .15s}
.sin:focus{border-color:var(--bd2)}.sin::placeholder{color:var(--mt)}
.rc{font-family:var(--mo);font-size:12px;color:var(--mt);white-space:nowrap;align-self:center}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:8px}

/* HOOK CARD */
.hcard{background:var(--s1);border:1px solid var(--bd);overflow:hidden;transition:border-color .2s,transform .15s;position:relative}
.hcard:hover{border-color:var(--bd2);transform:translateY(-1px)}
.hcard-top{height:2px}
.hcard-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 9px;border-bottom:1px solid var(--bd)}
.hcard-num{font-family:var(--mo);font-size:9px;color:var(--mt);letter-spacing:.08em}
.hcard-tags{display:flex;gap:5px;flex-wrap:wrap}
.htag{font-family:var(--mo);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;font-weight:700}
.ht-4c{background:rgba(255,78,106,.12);color:var(--c4c)}
.ht-ugc{background:rgba(255,185,48,.12);color:var(--ugc)}
.ht-vo{background:rgba(124,111,255,.12);color:var(--vo)}
.ht-txt{background:rgba(62,207,142,.12);color:var(--txt)}
.ht-pain{background:rgba(255,78,106,.12);color:var(--pain)}
.ht-social{background:rgba(124,111,255,.12);color:var(--social)}
.ht-proof{background:rgba(255,185,48,.12);color:var(--proof)}
.ht-edu{background:rgba(200,255,0,.1);color:var(--edu)}
.hcard-body{padding:13px 14px 10px}
.hook-txt{font-size:14px;font-weight:800;color:var(--wh);line-height:1.35;letter-spacing:-.01em;margin-bottom:6px}
.hook-type{font-family:var(--mo);font-size:9px;color:var(--mt);letter-spacing:.1em;text-transform:uppercase}
.hcard-ft{padding:8px 14px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.hook-tip{font-size:11px;color:var(--mt);flex:1;line-height:1.5}
.cpybtn{font-family:var(--mo);font-size:11px;padding:8px 16px;border:1px solid var(--bd2);background:transparent;color:var(--mt2);cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;white-space:nowrap;min-width:64px;-webkit-tap-highlight-color:transparent}
.cpybtn:hover{background:var(--s2);color:var(--tx)}.cpybtn.ok{color:var(--good);border-color:var(--good)}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--mt);grid-column:1/-1}
.empty-ic{font-size:40px;margin-bottom:12px}
.empty-tx{font-size:14px;color:var(--mt2)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);border:1px solid var(--bd2);padding:12px 20px;font-size:13px;color:var(--tx);z-index:1000;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* RANDOM PICK */
.rand-wrap{background:var(--s1);border:1px solid var(--acc);padding:20px 22px;margin-bottom:24px;position:relative}
.rand-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--acc2))}
.rand-label{font-family:var(--mo);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--acc);margin-bottom:10px}
.rand-hook-txt{font-size:18px;font-weight:800;color:var(--wh);line-height:1.3;margin-bottom:8px;letter-spacing:-.01em}
.rand-meta{font-size:12px;color:var(--mt2);margin-bottom:14px}
.rand-acts{display:flex;gap:8px;flex-wrap:wrap}
.rbtn{padding:8px 16px;font-family:var(--mo);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;transition:all .15s}
.rbtn.primary{background:var(--acc);color:#000}.rbtn.primary:hover{background:#d4ff1a}
.rbtn.sec{background:transparent;border:1px solid var(--bd2);color:var(--mt2)}.rbtn.sec:hover{color:var(--tx)}

/* MOBILE */
@media(max-width:768px){
  .hero{padding:32px 16px 28px}.content{padding:16px 12px 80px}.nav-inner{padding:0 12px}
  .grid{grid-template-columns:1fr;gap:6px}.hero-title{font-size:clamp(36px,10vw,60px)}
  .ntab{padding:12px 10px;font-size:11px}.nc{display:none}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-ey">TsekvG · Productdrop + LifeOS · Hook Bank</div>
  <h1 class="hero-title">Hook<em>Bank</em></h1>
  <p class="hero-sub">Productdrop болон LifeOS-д зориулсан 400 бэлэн hook. Ангилал бүрт шүүж, copy хийж ашиглана.</p>
  <div class="hero-stats">
    <div class="hs"><span class="hs-val" id="ttl">400</span><span class="hs-lbl">Нийт Hook</span></div>
    <div class="hs"><span class="hs-val" id="copied-cnt">0</span><span class="hs-lbl">Copy хийсэн</span></div>
    <div class="hs"><span class="hs-val" id="cur-cnt">400</span><span class="hs-lbl">Харагдаж байна</span></div>
  </div>
</div>

<nav class="nav">
  <div class="nav-inner">
    <button class="ntab on" id="tab-all" onclick="sw('all',this)">Бүгд<span class="nc" id="nc-all">400</span></button>
    <div class="nav-sep"></div>
    <button class="ntab t4c" id="tab-4c" onclick="sw('4c',this)">🎬 4C<span class="nc" id="nc-4c"></span></button>
    <button class="ntab tugc" id="tab-ugc" onclick="sw('ugc',this)">🤳 UGC<span class="nc" id="nc-ugc"></span></button>
    <button class="ntab tvo" id="tab-vo" onclick="sw('vo',this)">🎙 VO<span class="nc" id="nc-vo"></span></button>
    <button class="ntab ttxt" id="tab-txt" onclick="sw('txt',this)">✏️ Text<span class="nc" id="nc-txt"></span></button>
    <div class="nav-sep"></div>
    <button class="ntab tpain" id="tab-pain" onclick="sw('pain',this)">😤 Pain<span class="nc" id="nc-pain"></span></button>
    <button class="ntab tsocial" id="tab-social" onclick="sw('social',this)">📱 Social<span class="nc" id="nc-social"></span></button>
    <button class="ntab tproof" id="tab-proof" onclick="sw('proof',this)">💰 Value<span class="nc" id="nc-proof"></span></button>
    <button class="ntab tedu" id="tab-edu" onclick="sw('edu',this)">🎓 Edu<span class="nc" id="nc-edu"></span></button>
    <div class="nav-sep"></div>
    <button class="rand-btn-nav" onclick="rollRandom()">🎲 Random</button>
  </div>
</nav>

<div class="content">
  <div class="rand-wrap" id="rand-wrap">
    <div class="rand-label">🎲 Өнөөдрийн hook</div>
    <div class="rand-hook-txt" id="rand-hook">Уншиж байна...</div>
    <div class="rand-meta" id="rand-meta"></div>
    <div class="rand-acts">
      <button class="rbtn primary" onclick="copyRand()">Copy хийх</button>
      <button class="rbtn sec" onclick="rollRandom()">🎲 Өөр</button>
    </div>
  </div>

  <div class="toolbar">
    <div class="sw"><span class="si">⌕</span><input class="sin" id="search-in" placeholder="Hook хайх..." oninput="doSearch(this.value)"></div>
    <span class="rc" id="res-count"></span>
  </div>

  <div class="grid" id="main-grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
// HOOK DATA — 400 hooks
// cat: 4c | ugc | vo | txt | pain | social | proof | edu
// type: question | statement | list | curiosity | pattern-interrupt | social-proof | challenge | reveal
// tip: 1-line filming note
// ══════════════════════════════════════════════════
const HOOKS = [

// ── 4C FRAMEWORK (50) ──────────────────────────────
{id:1,hook:"Өдрөө зохион байгуулж чадахгүй байна уу?",cat:"4c",type:"question",tip:"Эхний үгэнд зогсоод камерт шууд хар"},
{id:2,hook:"Яагаад routine тогтооход ийм хэцүү байдаг вэ?",cat:"4c",type:"question",tip:"Гараа дэлгэж, 'яагаад' гэдэг үгэнд accent өг"},
{id:3,hook:"Productivity-г нэмэгдүүлэх хамгийн хялбар арга",cat:"4c",type:"statement",tip:"Confidence-тай, хурдан хэл — дуусаад zoom out"},
{id:4,hook:"Өнөөдрийн checklist-ийг гүйцэтгэсэн үү?",cat:"4c",type:"question",tip:"Эргэлзээтэй нүдээр асуу — хариуг мэдэж байгаа юм шиг"},
{id:5,hook:"Streak 7 хоног хадгалж чадах уу?",cat:"4c",type:"challenge",tip:"Challenge мэт хэлэх — хөмсгөө өргө"},
{id:6,hook:"Та өдрийнхөө хэдэн хувийг дэмий зарцуулдаг вэ?",cat:"4c",type:"question",tip:"Тоог хэлэхэд нь гайхсан мэт хар"},
{id:7,hook:"Level 1 → Level 10 хүртэлх аяллыг харахыг хүсэх үү?",cat:"4c",type:"curiosity",tip:"'Level 10' гэж хэлэхэд гараараа 10 дугаар үзүүл"},
{id:8,hook:"Нэг жилийн дараа хаана байхыг хүсэж байна?",cat:"4c",type:"question",tip:"Дээш хар — 'нэг жил' гэж хэлэхэд"},
{id:9,hook:"Goal setting хийгээд л мартдаг хүмүүст",cat:"4c",type:"statement",tip:"Шууд камерт хар, 'та' гэж хэлэх шиг"},
{id:10,hook:"Focus байхгүй? Систем хэрэгтэй байна",cat:"4c",type:"statement",tip:"Товч, хурдан — паузгүй"},
{id:11,hook:"Амьдралаа системтэй болгохыг хүсэж байна уу?",cat:"4c",type:"question",tip:"Халуун дотно өнгөөр, 'амьдрал' гэдэг үгэнд зогс"},
{id:12,hook:"Бие барихаас илүү зүйл алга — гэхдээ...",cat:"4c",type:"pattern-interrupt",tip:"'Гэхдээ' гэж хэлэхэд нь эргэлзсэн нүүр гарга"},
{id:13,hook:"Morning routine байхгүй бол productivity хоёр дахин буурна",cat:"4c",type:"statement",tip:"Баримт мэт — нотолгоотой хэл"},
{id:14,hook:"Дасгал хийх routine тогтоогоо гэхдээ 3 дахь долоо хоног...",cat:"4c",type:"curiosity",tip:"Дуусгалгүй орхи — эргүүлэх зорилгоор"},
{id:15,hook:"Productivity-г tоглоом болгочихвол яах байв?",cat:"4c",type:"curiosity",tip:"Инээмсэглэл + 'яах байв' гэдэг үгэнд нүдээ аниа"},
{id:16,hook:"Routinesiz ажилладаг хүн GPS-гүй жолоодохтой адил",cat:"4c",type:"statement",tip:"Харьцуулалтыг тодорхой хэл — хоёр гараа ашиглан"},
{id:17,hook:"Хамгийн сайн productivity hack: consistency",cat:"4c",type:"reveal",tip:"'Consistency' гэдэг үгийг удаан, тод хэл"},
{id:18,hook:"Цагийг хэрхэн зарцуулж байгаагаа мэддэг үү?",cat:"4c",type:"question",tip:"Хариулт нь 'үгүй' гэдгийг мэдэж байгаа мэт асуу"},
{id:19,hook:"Нэг сарын дараа тань ямар мэдрэмж төрөх вэ?",cat:"4c",type:"question",tip:"Хол харж, сарны хугацааг visualize хий"},
{id:20,hook:"Та ямар төрлийн хүн бэ: planner эсвэл spontaneous?",cat:"4c",type:"question",tip:"Хоёр гараа ашиглан хоёр сонголт үзүүл"},
{id:21,hook:"Sleep, food, work, train — бүгдийг нэг дор",cat:"4c",type:"list",tip:"Тус бүр дээр нэг хуруугаа нугала — ритмтэй"},
{id:22,hook:"Та productivity апп-д мөнгөө дэмий үрэж байна уу?",cat:"4c",type:"question",tip:"Гайхсан, шүүмжлэгч өнгөөр"},
{id:23,hook:"Амьдралдаа routine байхгүй бол энэ видеог үзэ",cat:"4c",type:"statement",tip:"Шууд командлах өнгө — эргэлзэлгүй"},
{id:24,hook:"Habit tracking хийж байна уу? Буруу арга хэрэглэж байвал...",cat:"4c",type:"curiosity",tip:"'Буруу' гэдэг үгэнд scroll зогсоно"},
{id:25,hook:"Нэг долоо хоногийн дараа яаж мэдрэхийг хүсэх вэ?",cat:"4c",type:"question",tip:"Эерэг vision — нүдэнд гэрэл оруул"},
{id:26,hook:"Өдрийн эцэст 'юу ч хийгээгүй' мэдрэмж байдаг уу?",cat:"4c",type:"question",tip:"Буруутай нүдтэйгээр — мэдрэмжийг ойлгодог юм шиг"},
{id:27,hook:"Хурдан асуулт: өнөөдрийн зорилгоо хүрсэн үү?",cat:"4c",type:"question",tip:"Шууд, нэг эшмэгтэй — маш хурдан"},
{id:28,hook:"Boss battle хийж байна уу?",cat:"4c",type:"question",tip:"Тоглоомын нэр томъёог хурдан, уйтгаргүй хэл"},
{id:29,hook:"Олон зүйл хийхийг хүсдэг ч цаг алдагддаг уу?",cat:"4c",type:"question",tip:"Уйтгарласан нүдтэй — бодит pain мэт"},
{id:30,hook:"2026 оны goal-оо хэрэгжүүлж байна уу?",cat:"4c",type:"question",tip:"Огноог тодорхой хэл — urgency үүсгэ"},
{id:31,hook:"Уншиж буй зүйлдээ, хийж буй зүйлдээ системтэй байдаг уу?",cat:"4c",type:"question",tip:"Хоёр талыг гарааа ашиглан"},
{id:32,hook:"Дэлхийн хамгийн busy хүн биш — цаг байна",cat:"4c",type:"statement",tip:"Тэвчилтэй, итгэлтэй өнгөөр хэл"},
{id:33,hook:"Productivity-д хамгийн их нөлөөлдөг зүйл юу вэ?",cat:"4c",type:"question",tip:"Хариулт гарч ирэх шиг зогс — пауз ав"},
{id:34,hook:"Одоо эхлэхэд хэтэрхий оройтоогүй",cat:"4c",type:"statement",tip:"Амлалт мэт — камерт шууд, халуун"},
{id:35,hook:"Юу ч хийгээгүй өдрийн мэдрэмжийг мэдэх үү?",cat:"4c",type:"question",tip:"Гунигтай нүүр — тэр мэдрэмжийг act хий"},
{id:36,hook:"Чи дэлхийн хамгийн busy хүн биш",cat:"4c",type:"pattern-interrupt",tip:"Хэн нэгний excuse-ийг таслаад байгаа мэт"},
{id:37,hook:"Self-improvement journey эхлүүлэхийг хүсэж байна уу?",cat:"4c",type:"question",tip:"Урам дүүрэн, гэрэлтэй нүүр"},
{id:38,hook:"Хамгийн productivity-тай хүмүүс нийтлэг нэг зүйл хийдэг",cat:"4c",type:"reveal",tip:"'Нэг зүйл' гэдэг үгийг тодотго — хуруугаа өргө"},

  'ugc': {bg:'rgba(255,185,48,.12)',  color:'var(--ugc)',   label:'🤳 UGC'},
  'vo':  {bg:'rgba(124,111,255,.12)', color:'var(--vo)',    label:'🎙 VO'},
  'txt': {bg:'rgba(62,207,142,.12)',  color:'var(--txt)',   label:'✏️ Text'},
  'pain':{bg:'rgba(255,78,106,.12)',  color:'var(--pain)',  label:'😤 Pain'},
  'social':{bg:'rgba(124,111,255,.12)',color:'var(--social)',label:'📱 Social'},
  'proof':{bg:'rgba(255,185,48,.12)', color:'var(--proof)', label:'💰 Value'},
  'edu': {bg:'rgba(200,255,0,.1)',    color:'var(--edu)',   label:'🎓 Edu'},
};
const TYPE_LABEL = {
  question:'Асуулт',statement:'Мэдэгдэл',list:'Жагсаалт',curiosity:'Сонирхол',
  'pattern-interrupt':'Таслалт','social-proof':'Нотолгоо',challenge:'Тэмцэл',reveal:'Нээлт'
};

let currentCat = 'all';
let copiedCount = 0;

function updStats(){
  const vis = document.querySelectorAll('.hcard:not([style*="none"])').length;
  document.getElementById('cur-cnt').textContent = vis;
  document.getElementById('copied-cnt').textContent = copiedCount;
}

function buildCard(h){
  const cc = CAT_COLORS[h.cat];
  const tl = TYPE_LABEL[h.type] || h.type;
  return `<div class="hcard" data-cat="${h.cat}" data-search="${h.hook.toLowerCase()}">
    <div class="hcard-top" style="background:${cc.color}"></div>
    <div class="hcard-head">
      <span class="hcard-num">#${String(h.id).padStart(3,'0')}</span>
      <div class="hcard-tags">
        <span class="htag ht-${h.cat}" style="background:${cc.bg};color:${cc.color}">${cc.label}</span>
        <span class="htag" style="background:var(--bd);color:var(--mt2)">${tl}</span>
      </div>
    </div>
    <div class="hcard-body">
      <div class="hook-txt">${h.hook}</div>
      <div class="hook-type">${tl.toUpperCase()}</div>
    </div>
    <div class="hcard-ft">
      <div class="hook-tip">💡 ${h.tip}</div>
      <button class="cpybtn" onclick="copyHook(this,'${h.hook.replace(/'/g,"\\'")}')">Copy</button>
    </div>
  </div>`;
}

function renderGrid(cat, query=''){
  const grid = document.getElementById('main-grid');
  let filtered = cat === 'all' ? HOOKS : HOOKS.filter(h=>h.cat===cat);
  if(query) filtered = filtered.filter(h=>h.hook.toLowerCase().includes(query.toLowerCase()));
  if(!filtered.length){
    grid.innerHTML = `<div class="empty"><div class="empty-ic">🔍</div><div class="empty-tx">"${query}" — илэрц олдсонгүй</div></div>`;
    document.getElementById('res-count').textContent = '0 hook';
    return;
  }
  grid.innerHTML = filtered.map(buildCard).join('');
  document.getElementById('res-count').textContent = query ? `${filtered.length} үр дүн` : '';
  document.getElementById('cur-cnt').textContent = filtered.length;
}

function sw(cat, btn){
  currentCat = cat;
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  if(btn) btn.classList.add('on');
  document.getElementById('search-in').value = '';
  document.getElementById('res-count').textContent = '';
  renderGrid(cat);
}

function doSearch(q){
  renderGrid(currentCat, q);
}

function copyText(text, onSuccess){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(onSuccess).catch(()=>fallbackCopy(text,onSuccess));
  } else {
    fallbackCopy(text, onSuccess);
  }
}

function fallbackCopy(text, onSuccess){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    onSuccess();
  } catch(e){}
  document.body.removeChild(ta);
}

function copyHook(btn, text){
  copyText(text, ()=>{
    btn.textContent = '✓ OK';
    btn.classList.add('ok');
    copiedCount++;
    document.getElementById('copied-cnt').textContent = copiedCount;
    showToast('✓ Copied!');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('ok')},2000);
  });
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function rollRandom(){
  const pool = currentCat === 'all' ? HOOKS : HOOKS.filter(h=>h.cat===currentCat);
  const h = pool[Math.floor(Math.random()*pool.length)];
  const cc = CAT_COLORS[h.cat];
  document.getElementById('rand-hook').textContent = h.hook;
  document.getElementById('rand-meta').textContent = `#${h.id} · ${cc.label} · ${TYPE_LABEL[h.type]} · 💡 ${h.tip}`;
  document.getElementById('rand-wrap').dataset.hook = h.hook;
}

function copyRand(){
  const hook = document.getElementById('rand-hook').textContent;
  if(hook && hook !== 'Уншиж байна...'){
    copyText(hook, ()=>{
      copiedCount++;
      document.getElementById('copied-cnt').textContent = copiedCount;
      showToast('✓ Copied!');
    });
  }
}

// Nav counts
function initNavCounts(){
  const cats = ['4c','ugc','vo','txt','pain','social','proof','edu'];
  cats.forEach(cat=>{
    const cnt = HOOKS.filter(h=>h.cat===cat).length;
    const el = document.getElementById('nc-'+cat);
    if(el) el.textContent = cnt;
  });
  document.getElementById('nc-all').textContent = HOOKS.length;
}

// INIT
initNavCounts();
renderGrid('all');
rollRandom();
</script>
