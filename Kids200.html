<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIDS — Product Research</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --bg2: #121212; --bg3: #1a1a1a;
    --border: #222222; --border2: #333333;
    --text: #f0f0f0; --muted: #777777; --muted2: #3a3a3a;
    --accent: #ff4ecb; --accent2: #ff6b35; --white: #ffffff;
    --tik: #69c9d0; --ig: #e1306c; --fb: #5890ff; --amz: #ffaa44; --ali: #ff6b35;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; min-height:100vh; overflow-x:hidden; font-size:14px; }

  /* ── LOGIN ── */
  #login-screen {
    position:fixed; inset:0; background:var(--bg);
    display:flex; align-items:center; justify-content:center; z-index:1000;
  }
  .login-box {
    width:400px; padding:56px 48px;
    border:1px solid var(--border2); background:var(--bg2); position:relative;
  }
  .login-box::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--accent); }
  .login-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:28px; letter-spacing:.15em; color:var(--white); margin-bottom:8px; }
  .login-logo span { color:var(--accent); }
  .login-sub { font-size:12px; color:var(--muted); letter-spacing:.2em; text-transform:uppercase; margin-bottom:44px; }
  .login-label { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; display:block; }
  .login-input {
    width:100%; background:var(--bg3); border:1px solid var(--border2);
    color:var(--text); font-family:'DM Mono',monospace; font-size:15px;
    padding:15px 18px; outline:none; transition:border-color .2s; letter-spacing:.1em;
  }
  .login-input:focus { border-color:var(--accent); }
  .login-btn {
    width:100%; margin-top:20px; padding:16px; background:var(--accent); color:#000;
    border:none; font-family:'Syne',sans-serif; font-weight:700; font-size:13px;
    letter-spacing:.2em; text-transform:uppercase; cursor:pointer; transition:opacity .2s;
  }
  .login-btn:hover { opacity:.85; }
  .login-error { margin-top:14px; font-size:12px; color:var(--accent2); letter-spacing:.1em; display:none; text-align:center; }

  /* ── APP ── */
  #app { display:none; }

  .header {
    position:sticky; top:0; background:var(--bg); border-bottom:1px solid var(--border);
    padding:0 44px; height:66px; display:flex; align-items:center; justify-content:space-between; z-index:100;
  }
  .header-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; letter-spacing:.2em; color:var(--white); }
  .header-logo span { color:var(--accent); }
  .header-right { display:flex; align-items:center; gap:20px; }
  .header-meta { font-size:12px; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; }
  .save-btn {
    padding:10px 22px; background:var(--accent); color:#000; border:none;
    font-family:'Syne',sans-serif; font-weight:700; font-size:11px;
    letter-spacing:.15em; text-transform:uppercase; cursor:pointer; transition:opacity .2s;
  }
  .save-btn:hover { opacity:.8; }
  .saved-msg { font-size:12px; color:var(--accent); letter-spacing:.15em; opacity:0; transition:opacity .4s; }

  .stats-bar {
    padding:22px 44px; border-bottom:1px solid var(--border);
    display:flex; gap:48px; background:var(--bg2);
  }
  .stat { display:flex; flex-direction:column; gap:5px; }
  .stat-val { font-family:'Syne',sans-serif; font-weight:700; font-size:26px; color:var(--white); }
  .stat-val.accent { color:var(--accent); }
  .stat-label { font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }

  /* ── TABLE ── */
  .table-wrap { padding:0 44px 80px; }

  table { width:100%; border-collapse:collapse; }
  thead tr { border-bottom:2px solid var(--border2); position:sticky; top:66px; background:var(--bg); z-index:50; }
  th {
    font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted);
    padding:18px 14px; text-align:left; font-weight:400; white-space:nowrap;
  }
  th:first-child { padding-left:0; }
  tbody tr { border-bottom:1px solid var(--border); transition:background .12s; }
  tbody tr:hover { background:var(--bg2); }
  td { padding:16px 14px; font-size:13px; color:var(--text); vertical-align:top; }
  td:first-child { padding-left:0; }

  .td-num { color:var(--muted); font-size:12px; width:44px; padding-top:18px; }
  .td-name { font-family:'Syne',sans-serif; font-weight:600; font-size:15px; color:var(--white); min-width:200px; padding-top:16px; line-height:1.4; }
  .td-cat { font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--accent); background:rgba(255,78,203,.08); padding:5px 12px; display:inline-block; margin-top:10px; border:1px solid rgba(255,78,203,.2); }

  /* Links */
  .links-col { display:flex; flex-direction:column; gap:7px; min-width:170px; }
  .link-row { display:flex; gap:6px; }

  .link-wrap { position:relative; display:flex; align-items:stretch; gap:0; }
  .link-btn {
    display:inline-flex; align-items:center; gap:6px; padding:7px 12px;
    font-size:11px; letter-spacing:.1em; text-transform:uppercase; text-decoration:none;
    border:1px solid var(--border2); color:#999; background:transparent;
    white-space:nowrap; transition:all .15s; font-family:'DM Mono',monospace; cursor:pointer;
  }
  .link-btn:hover { background:rgba(255,255,255,.04); }
  .link-btn.ali:hover  { border-color:var(--ali); color:var(--ali); background:rgba(255,107,53,.06); }
  .link-btn.tik:hover  { border-color:var(--tik); color:var(--tik); background:rgba(105,201,208,.06); }
  .link-btn.ig:hover   { border-color:var(--ig);  color:var(--ig);  background:rgba(225,48,108,.06); }
  .link-btn.fb:hover   { border-color:var(--fb);  color:var(--fb);  background:rgba(88,144,255,.06); }
  .link-btn.amz:hover  { border-color:var(--amz); color:var(--amz); background:rgba(255,170,68,.06); }

  .dot { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; }

  /* platform colored dots */
  .link-btn.ali .dot { background:var(--ali); }
  .link-btn.tik .dot { background:var(--tik); }
  .link-btn.ig  .dot { background:var(--ig); }
  .link-btn.fb  .dot { background:var(--fb); }
  .link-btn.amz .dot { background:var(--amz); }

  .edit-btn {
    padding:0 10px; border:1px solid var(--border2); border-left:0;
    background:transparent; color:var(--muted); cursor:pointer; font-size:13px;
    display:flex; align-items:center; justify-content:center; transition:all .12s;
    flex-shrink:0;
  }
  .edit-btn:hover { background:var(--bg3); color:var(--accent); border-color:var(--accent); }

  /* Edit modal */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.88);
    display:none; align-items:center; justify-content:center; z-index:500;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    width:520px; background:var(--bg2); border:1px solid var(--border2);
    padding:36px; position:relative;
  }
  .modal::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--accent); }
  .modal-title { font-family:'Syne',sans-serif; font-weight:700; font-size:16px; color:var(--white); margin-bottom:6px; }
  .modal-sub { font-size:12px; color:var(--muted); letter-spacing:.15em; margin-bottom:28px; }
  .modal-field { margin-bottom:18px; }
  .modal-label { font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; display:block; }
  .modal-input {
    width:100%; background:var(--bg3); border:1px solid var(--border2);
    color:var(--text); font-family:'DM Mono',monospace; font-size:12px;
    padding:11px 14px; outline:none; transition:border-color .15s;
  }
  .modal-input:focus { border-color:var(--accent); }
  .modal-actions { display:flex; gap:10px; margin-top:28px; }
  .modal-save {
    flex:1; padding:14px; background:var(--accent); color:#000; border:none;
    font-family:'Syne',sans-serif; font-weight:700; font-size:12px;
    letter-spacing:.15em; text-transform:uppercase; cursor:pointer;
  }
  .modal-cancel {
    padding:14px 24px; background:transparent; border:1px solid var(--border2);
    color:var(--muted); font-family:'DM Mono',monospace; font-size:12px; cursor:pointer;
  }
  .modal-cancel:hover { border-color:var(--muted); color:var(--text); }

  /* Ratings */
  .ratings-col { display:flex; flex-direction:column; gap:7px; min-width:240px; }
  .rating-row { display:flex; align-items:center; gap:10px; }
  .rating-key { font-size:11px; color:#888; letter-spacing:.05em; width:96px; flex-shrink:0; }
  .rating-select {
    background:var(--bg3); border:1px solid var(--border2); color:#aaa;
    font-family:'DM Mono',monospace; font-size:12px; padding:6px 10px;
    outline:none; cursor:pointer; transition:all .12s; appearance:none;
    -webkit-appearance:none; min-width:110px;
  }
  .rating-select:focus { border-color:var(--accent); }
  .rating-select.val-good    { color:#ff4ecb; border-color:rgba(255,78,203,.4); background:rgba(255,78,203,.05); }
  .rating-select.val-wow     { color:#ff4ecb; border-color:rgba(255,78,203,.4); background:rgba(255,78,203,.05); }
  .rating-select.val-notbad  { color:#ffaa00; border-color:rgba(255,170,0,.4); background:rgba(255,170,0,.05); }
  .rating-select.val-bad     { color:#ff5555; border-color:rgba(255,85,85,.4);  background:rgba(255,85,85,.05); }
  .rating-select.val-yes     { color:#ff4ecb; border-color:rgba(255,78,203,.4); background:rgba(255,78,203,.05); }
  .rating-select.val-no      { color:#ff5555; border-color:rgba(255,85,85,.4);  background:rgba(255,85,85,.05); }
  .rating-select.val-notyet  { color:#ffaa00; border-color:rgba(255,170,0,.4); background:rgba(255,170,0,.05); }
  .rating-select.val-vgood   { color:#ff4ecb; border-color:rgba(255,78,203,.4); background:rgba(255,78,203,.05); }
  .rating-select.val-3x      { color:#ffaa00; border-color:rgba(255,170,0,.4); background:rgba(255,170,0,.05); }
  .rating-select.val-5x      { color:#ff4ecb; border-color:rgba(255,78,203,.4); background:rgba(255,78,203,.05); }

  .notes-input {
    background:var(--bg3); border:1px solid var(--border2); color:var(--text);
    font-family:'DM Mono',monospace; font-size:12px; padding:8px 10px;
    outline:none; width:100%; resize:none; transition:border-color .12s; height:46px;
  }
  .notes-input:focus { border-color:var(--accent); }
  .notes-input::placeholder { color:#444; font-size:11px; }
  .value-info-input { height:54px; border-color:rgba(255,78,203,.2); }
  .value-info-input:focus { border-color:var(--accent); }
  .value-info-wrap { margin-bottom:4px; }

  .no-link { font-size:11px; color:var(--muted2); padding:7px 0; }
  .add-link-btn {
    display:inline-flex; align-items:center; padding:7px 10px;
    font-size:10px; letter-spacing:.1em; text-transform:uppercase;
    border:1px dashed var(--border2); color:var(--muted); background:transparent;
    cursor:pointer; font-family:'DM Mono',monospace; transition:all .15s; white-space:nowrap;
  }
  .add-link-btn:hover { border-color:var(--accent); color:var(--accent); }
  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border2); }
  /* ── MOBILE RESPONSIVE ── */
  @media (max-width: 768px) {
    .login-box { width: calc(100% - 32px); max-width: 400px; padding: 36px 24px; }
    .header { padding: 0 16px; height: auto; min-height: 56px; flex-wrap: wrap; gap: 8px; padding-top: 10px; padding-bottom: 10px; }
    .header-logo { font-size: 15px; }
    .header-right { gap: 10px; }
    .header-meta { display: none; }
    .save-btn { padding: 8px 14px; font-size: 10px; }
    .stats-bar { padding: 14px 16px; gap: 20px; flex-wrap: wrap; }
    .stat-val { font-size: 20px; }
    .stat-label { font-size: 10px; }
    .table-wrap { padding: 0 0 80px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { min-width: 700px; }
    thead tr { top: 56px; }
    th { padding: 14px 10px; font-size: 10px; }
    td { padding: 12px 10px; font-size: 12px; }
    .td-name { min-width: 140px; font-size: 13px; }
    .links-col { min-width: 130px; }
    .link-btn { padding: 6px 8px; font-size: 10px; }
    .ratings-col { min-width: 190px; }
    .rating-select { min-width: 90px; font-size: 11px; padding: 5px 7px; }
    .rating-key { width: 80px; font-size: 10px; }
    .modal { width: calc(100% - 24px); max-width: 520px; padding: 24px 18px; max-height: 90vh; overflow-y: auto; }
  }
  @media (max-width: 480px) {
    .header-logo { font-size: 13px; letter-spacing: .1em; }
    .stats-bar { gap: 14px; }
    .stat-val { font-size: 18px; }
    table { min-width: 620px; }
    .td-name { min-width: 120px; font-size: 12px; }
    .ratings-col { min-width: 170px; }
    .rating-select { min-width: 80px; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">KIDS<span>.</span></div>
    <div class="login-sub">Product Research Database</div>
    <label class="login-label">Access Password</label>
    <input type="password" class="login-input" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkPwd()">
    <button class="login-btn" onclick="checkPwd()">Enter →</button>
    <div class="login-error" id="pwd-error">Incorrect password</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="header">
    <div class="header-logo">KIDS<span>.</span></div>
    <div class="header-right">
      <span class="saved-msg" id="saved-msg">✓ Saved</span>
      <button class="save-btn" onclick="saveAll()">Save All</button>
      <div class="header-meta">200 Products</div>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat"><div class="stat-val accent">200</div><div class="stat-label">Total Products</div></div>
    <div class="stat"><div class="stat-val">Kids</div><div class="stat-label">Category</div></div>
    <div class="stat"><div class="stat-val" id="stat-rated">0</div><div class="stat-label">Rated</div></div>
  </div>

  <div class="table-wrap">
    <table id="product-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Product</th>
          <th>Cat</th>
          <th>Supplier Links</th>
          <th>Viral Ads</th>
          <th>Competitors</th>
          <th>Ratings & Notes</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Edit Links</div>
    <div class="modal-sub" id="modal-sub">—</div>
    <div class="modal-field">
      <label class="modal-label">Supplier 1 (Alibaba)</label>
      <input class="modal-input" id="m-sup1" placeholder="https://alibaba.com/...">
    </div>
    <div class="modal-field">
      <label class="modal-label">Supplier 2 (Alibaba DS)</label>
      <input class="modal-input" id="m-sup2" placeholder="https://alibaba.com/...">
    </div>
    <div class="modal-field">
      <label class="modal-label">Viral Ad 1 (TikTok)</label>
      <input class="modal-input" id="m-tik" placeholder="https://tiktok.com/...">
    </div>
    <div class="modal-field">
      <label class="modal-label">Viral Ad 2 (Instagram)</label>
      <input class="modal-input" id="m-ig" placeholder="https://instagram.com/...">
    </div>
    <div class="modal-field">
      <label class="modal-label">Facebook Ad Library</label>
      <input class="modal-input" id="m-fb" placeholder="https://facebook.com/ads/library/...">
    </div>
    <div class="modal-field">
      <label class="modal-label">Competitor 1</label>
      <input class="modal-input" id="m-comp1" placeholder="https://...">
    </div>
    <div class="modal-field">
      <label class="modal-label">Competitor 2</label>
      <input class="modal-input" id="m-comp2" placeholder="https://...">
    </div>
    <div class="modal-actions">
      <button class="modal-save" onclick="saveModal()">Save Links</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const AI_RATINGS = {
  // Toys & Play
  "Magnetic Tiles Set": {"value": "good", "wow": "wow", "saturation": "notyet", "easy": "vgood", "margin": "5x", "unique": "yes", "problem": "yes", "notes": "STEM toy, creative play. Incredible build demo content. Parents love it."},

  "Bubble Gun Toy": {"value": "good", "wow": "wow", "saturation": "notyet", "easy": "vgood", "margin": "5x", "unique": "yes", "problem": "yes", "notes": "Endless bubble stream = mesmerizing demo. Outdoor summer toy."},
  "Water Balloon Pump Kit": {"value": "good", "wow": "wow", "saturation": "notyet", "easy": "vgood", "margin": "5x", "unique": "yes", "problem": "yes", "notes": "Summer viral product. Fast fill hack = content hook."},
  "Nerf Compatible Blaster": {"value": "good", "wow": "wow", "saturation": "notyet", "easy": "vgood", "margin": "5x", "unique": "yes", "problem": "yes", "notes": "Battle play content. Strong boys audience. Repeat purchase ammo."},

  // Arts & Crafts

function defaultLinks(name) {
  const p = name.replace(/ /g,'+'), q = encodeURIComponent(name);
  return {
    sup1:  `https://www.alibaba.com/trade/search?SearchText=${p}&IndexArea=product_en`,
    sup2:  `https://www.alibaba.com/trade/search?SearchText=${p}+dropshipping&IndexArea=product_en`,
    tik:   `https://www.tiktok.com/search?q=${q}`,
    ig:    `https://www.instagram.com/explore/search/keyword/?q=${q}`,
    fb:    `https://www.facebook.com/ads/library/?active_status=active&ad_type=all&country=US&q=${p}&search_type=keyword_unordered`,
    comp1: `https://www.amazon.com/s?k=${p}`,
    comp2: ``
  };
}

function defaultRatings(name) {
  const r = AI_RATINGS[name];
  if (r) return { valueInfo:'', value:r.value||'', wow:r.wow||'', saturation:r.saturation||'', easy:r.easy||'', margin:r.margin||'', unique:r.unique||'', problem:r.problem||'', notes:'' };
  return { valueInfo:'', value:'', wow:'', saturation:'', easy:'', margin:'', unique:'', problem:'', notes:'' };
}

function initData() {
  const saved = localStorage.getItem('kids_research_v1');
  if (saved) { try { data = JSON.parse(saved); } catch(e) { data = {}; } }
  PRODUCTS.forEach((name, i) => {
    if (!data[i]) data[i] = { links: defaultLinks(name), ratings: defaultRatings(name) };
    if (!data[i].links) data[i].links = defaultLinks(name);
    const L = data[i].links;
    if (!('comp1' in L)) {
      L.comp1 = L.amz || '';
      L.comp2 = '';
      delete L.amz;
    }
    if (!data[i].ratings) data[i].ratings = defaultRatings(name);
    if (data[i].ratings.valueInfo === undefined) data[i].ratings.valueInfo = '';
  });
}

function saveAll() {
  localStorage.setItem('kids_research_v1', JSON.stringify(data));
  const msg = document.getElementById('saved-msg');
  msg.style.opacity = '1';
  setTimeout(() => msg.style.opacity = '0', 2000);
  updateStats();
}

function updateStats() {
  let rated = 0;
  PRODUCTS.forEach((_, i) => {
    const r = data[i].ratings;
    if (r.value || r.wow || r.margin) rated++;
  });
  document.getElementById('stat-rated').textContent = rated;
}

};

function valClass(key, val) {
  if (!val) return '';
  const map = { good:'val-good', wow:'val-wow', notbad:'val-notbad', bad:'val-bad',
    yes:'val-yes', no:'val-no', notyet:'val-notyet', vgood:'val-vgood',
    '3x':'val-3x', '5x':'val-5x' };
  return map[val] || '';
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = PRODUCTS.map((name, i) => {
    const L = data[i].links;
    const R = data[i].ratings;

    const linkBtn = (cls, label, href) =>
      `<a class="link-btn ${cls}" href="${href}" target="_blank"><span class="dot"></span>${label}</a>`;

    const ratings = Object.keys(RATING_OPTS).map(key => {
      const opts = RATING_OPTS[key].map(([v,l]) =>
        `<option value="${v}" ${R[key]===v?'selected':''}>${l}</option>`).join('');
      const cls = valClass(key, R[key]);
      return `<div class="rating-row">
        <span class="rating-key">${RATING_LABELS[key]}</span>
        <select class="rating-select ${cls}" onchange="updateRating(${i},'${key}',this)" data-key="${key}">
          ${opts}
        </select>
      </div>`;
    }).join('');
    const valueInfoHtml = `<div class="value-info-wrap">
      <span class="rating-key" style="font-size:10px;color:#666;margin-bottom:5px;display:block;letter-spacing:.1em;text-transform:uppercase;">Value Info</span>
      <textarea class="notes-input value-info-input" placeholder="Энэ хэсэгт та тухай барааг судлаад үнэ цэнийг нь тодорхойлж бичнэ..." onchange="updateValueInfo(${i},this)">${R.valueInfo||''}</textarea>
    </div>`;

    return `<tr id="row-${i}">
      <td class="td-num">${String(i+1).padStart(3,'0')}</td>
      <td class="td-name">${name}</td>
      <td><span class="td-cat">Kids</span></td>
      <td>
        <div class="links-col">
          <div class="link-row">
            <div class="link-wrap">
              ${linkBtn('ali','ALI·1',L.sup1)}
              <button class="edit-btn" onclick="openModal(${i})" title="Edit links">✎</button>
            </div>
            ${linkBtn('ali','ALI·2',L.sup2)}
          </div>
        </div>
      </td>
      <td>
        <div class="links-col">
          <div class="link-row">
            ${linkBtn('tik','TIK',L.tik)}
            ${linkBtn('ig','IG',L.ig)}
            ${linkBtn('fb','FB',L.fb)}
          </div>
        </div>
      </td>
      <td>
        <div class="links-col">
          <div class="link-row">
            ${L.comp1 ? linkBtn('amz','COMP·1',L.comp1) : '<span class="no-link">—</span>'}
            ${L.comp2 ? linkBtn('amz','COMP·2',L.comp2) : `<button class="add-link-btn" onclick="openModal(${i})">+ COMP·2</button>`}
          </div>
        </div>
      </td>
      <td>
        <div class="ratings-col">
          ${valueInfoHtml}
          ${ratings}
          <textarea class="notes-input" placeholder="Notes..." onchange="updateNotes(${i},this)">${R.notes||''}</textarea>
        </div>
      </td>
    </tr>`;
  }).join('');
  updateStats();
}

function updateRating(idx, key, sel) {
  const val = sel.value;
  data[idx].ratings[key] = val;
  sel.className = `rating-select ${valClass(key, val)}`;
  saveAll();
}

function updateValueInfo(idx, el) {
  data[idx].ratings.valueInfo = el.value;
  saveAll();
}

function updateNotes(idx, el) {
  data[idx].ratings.notes = el.value;
  saveAll();
}

// Modal
function openModal(idx) {
  editingIdx = idx;
  const L = data[idx].links;
  document.getElementById('modal-title').textContent = `Edit Links — ${PRODUCTS[idx]}`;
  document.getElementById('modal-sub').textContent = `#${String(idx+1).padStart(3,'0')} · Kids`;
  document.getElementById('m-sup1').value = L.sup1 || '';
  document.getElementById('m-sup2').value = L.sup2 || '';
  document.getElementById('m-tik').value  = L.tik  || '';
  document.getElementById('m-ig').value   = L.ig   || '';
  document.getElementById('m-fb').value   = L.fb   || '';
  document.getElementById('m-comp1').value = L.comp1 || '';
  document.getElementById('m-comp2').value = L.comp2 || '';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingIdx = null;
}

function saveModal() {
  if (editingIdx === null) return;
  data[editingIdx].links = {
    sup1: document.getElementById('m-sup1').value,
    sup2: document.getElementById('m-sup2').value,
    tik:  document.getElementById('m-tik').value,
    ig:   document.getElementById('m-ig').value,
    fb:   document.getElementById('m-fb').value,
    comp1: document.getElementById('m-comp1').value,
    comp2: document.getElementById('m-comp2').value,
  };
  saveAll();
  const row = document.getElementById(`row-${editingIdx}`);
  const tmp = document.createElement('tbody');
  tmp.innerHTML = (() => {
    const i = editingIdx, name = PRODUCTS[i];
    const L = data[i].links, R = data[i].ratings;
    const linkBtn = (cls,label,href) => `<a class="link-btn ${cls}" href="${href}" target="_blank"><span class="dot"></span>${label}</a>`;
    return `<tr id="row-${i}">
      <td class="td-num">${String(i+1).padStart(3,'0')}</td>
      <td class="td-name">${name}</td>
      <td><span class="td-cat">Kids</span></td>
      <td><div class="links-col"><div class="link-row">
        <div class="link-wrap">${linkBtn('ali','ALI·1',L.sup1)}<button class="edit-btn" onclick="openModal(${i})" title="Edit links">✎</button></div>
        ${linkBtn('ali','ALI·2',L.sup2)}</div></div></td>
      <td><div class="links-col"><div class="link-row">
        ${linkBtn('tik','TIK',L.tik)}${linkBtn('ig','IG',L.ig)}${linkBtn('fb','FB',L.fb)}
        </div></div></td>
      <td><div class="links-col"><div class="link-row">
        ${L.comp1?linkBtn('amz','COMP·1',L.comp1):'<span class="no-link">—</span>'}
        ${L.comp2?linkBtn('amz','COMP·2',L.comp2):`<button class="add-link-btn" onclick="openModal(${i})">+ COMP·2</button>`}
        </div></div></td>
      <td><div class="ratings-col">
        <div class="value-info-wrap">
          <span class="rating-key" style="font-size:10px;color:#666;margin-bottom:5px;display:block;letter-spacing:.1em;text-transform:uppercase;">Value Info</span>
          <textarea class="notes-input value-info-input" placeholder="Энэ хэсэгт та тухай барааг судлаад үнэ цэнийг нь тодорхойлж бичнэ..." onchange="updateValueInfo(${i},this)">${R.valueInfo||''}</textarea>
        </div>
        ${Object.keys(RATING_OPTS).map(key => {
          const opts = RATING_OPTS[key].map(([v,l]) => `<option value="${v}" ${R[key]===v?'selected':''}>${l}</option>`).join('');
          return `<div class="rating-row"><span class="rating-key">${RATING_LABELS[key]}</span>
            <select class="rating-select ${valClass(key,R[key])}" onchange="updateRating(${i},'${key}',this)">${opts}</select></div>`;
        }).join('')}
        <textarea class="notes-input" placeholder="Notes..." onchange="updateNotes(${i},this)">${R.notes||''}</textarea>
      </div></td>
    </tr>`;
  })();
  row.parentNode.replaceChild(tmp.firstChild, row);
  closeModal();
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Password
function checkPwd() {
  const val = document.getElementById('pwd-input').value;
  if (val === PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initData();
    renderTable();
  } else {
    const err = document.getElementById('pwd-error');
    err.style.display = 'block';
    document.getElementById('pwd-input').style.borderColor = '#ff4444';
    setTimeout(() => { err.style.display='none'; document.getElementById('pwd-input').style.borderColor=''; }, 2000);
  }
}
document.getElementById('pwd-input').addEventListener('keydown', e => { if(e.key==='Enter') checkPwd(); });
</script>
</body>
</html>
